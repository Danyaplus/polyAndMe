<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Наш чат">
  <title>Наш чат</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section id="setupScreen" class="screen setup-screen">
      <div class="setup-card">
        <div class="logo">💬</div>
        <h1>Наш чат</h1>
        <p>Введи личный код. Регистрация, почта и номер телефона не нужны.</p>
        <form id="joinForm">
          <input id="inviteCode" type="password" autocomplete="one-time-code"
                 placeholder="Личный код" maxlength="80" required>
          <button type="submit">Войти</button>
        </form>
        <p id="joinError" class="error" role="alert"></p>
      </div>
    </section>

    <section id="chatScreen" class="screen chat-screen hidden">
      <header class="chat-header">
        <div class="chat-title">
          <h1>Наш чат</h1>
          <p><span id="connectionStatus">Подключение…</span> · <span id="presenceStatus">собеседник не в сети</span></p>
        </div>
        <div class="header-actions">
          <button id="searchButton" class="icon-button" title="Поиск">🔍</button>
          <button id="callButton" class="icon-button" title="Позвонить">📞</button>
          <button id="installButton" class="icon-button hidden" title="Установить приложение">⬇️</button>
          <button id="soundButton" class="icon-button" title="Звук уведомлений">🔔</button>
          <button id="logoutButton" class="icon-button" title="Выйти">↪</button>
        </div>
      </header>

      <div id="searchPanel" class="search-panel hidden">
        <input id="searchInput" type="search" placeholder="Поиск по сообщениям…">
        <button id="closeSearch" type="button">×</button>
      </div>

      <div id="pinnedPanel" class="pinned-panel hidden">
        <span>📌</span>
        <button id="openPinned" type="button">Закреплённое сообщение</button>
        <button id="closePinned" type="button">×</button>
      </div>

      <div id="dropOverlay" class="drop-overlay hidden">Отпусти файл, чтобы прикрепить</div>

      <div id="messages" class="messages" aria-live="polite">
        <div id="emptyState" class="empty-state">
          <span>👋</span>
          <p>Здесь появятся ваши сообщения</p>
        </div>
      </div>

      <div id="typingBar" class="typing-bar hidden">Собеседник печатает…</div>

      <div id="replyBar" class="reply-bar hidden">
        <div>
          <strong id="replyName"></strong>
          <span id="replyText"></span>
        </div>
        <button id="cancelReply" type="button">×</button>
      </div>

      <div id="uploadBar" class="upload-bar hidden">
        <span id="uploadName"></span>
        <button id="cancelFile" type="button">×</button>
      </div>

      <div id="emojiPanel" class="emoji-panel hidden"></div>

      <form id="messageForm" class="composer">
        <input id="fileInput" type="file" hidden
               accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar">
        <input id="cameraInput" type="file" hidden accept="image/*" capture="environment">
        <button id="attachButton" class="attach-button" type="button" aria-label="Файл">📎</button>
        <button id="cameraButton" class="attach-button" type="button" aria-label="Камера">📷</button>
        <button id="voiceButton" class="attach-button" type="button" aria-label="Голосовое">🎙️</button>
        <textarea id="messageInput" rows="1" maxlength="4000"
                  placeholder="Сообщение…" aria-label="Сообщение"></textarea>
        <button id="emojiButton" class="attach-button" type="button" aria-label="Эмодзи">😊</button>
        <button id="sendButton" class="send-button" type="submit" aria-label="Отправить">➤</button>
      </form>
    </section>
  </main>

  <div id="contextMenu" class="context-menu hidden">
    <button data-action="reply">↩ Ответить</button>
    <button data-action="react">❤️ Реакция</button>
    <button data-action="pin">📌 Закрепить</button>
    <button data-action="edit">✏️ Изменить</button>
    <button data-action="delete">🗑 Удалить</button>
  </div>

  <div id="reactionPicker" class="reaction-picker hidden"></div>

  <div id="callModal" class="modal hidden">
    <div class="call-card">
      <div class="call-avatar">📞</div>
      <h2 id="callTitle">Аудиозвонок</h2>
      <p id="callState">Подключение…</p>
      <div class="call-actions">
        <button id="acceptCall" class="accept hidden">Принять</button>
        <button id="muteCall">🎤</button>
        <button id="endCall" class="end">Завершить</button>
      </div>
      <audio id="remoteAudio" autoplay></audio>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
