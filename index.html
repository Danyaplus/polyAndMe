<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121722">
  <title>Наш чат</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section id="setupScreen" class="screen setup-screen">
      <div class="setup-card">
        <div class="logo">💬</div>
        <h1>Наш чат</h1>
        <p>Введи личный код. Регистрация, почта и номер телефона не нужны.</p>
        <form id="joinForm">
          <input id="inviteCode" type="password" autocomplete="one-time-code"
                 placeholder="Личный код" maxlength="80" required>
          <button type="submit">Войти</button>
        </form>
        <p id="joinError" class="error" role="alert"></p>
      </div>
    </section>

    <section id="chatScreen" class="screen chat-screen hidden">
      <header class="chat-header">
        <div>
          <h1>Наш чат</h1>
          <p id="connectionStatus">Подключение…</p>
        </div>
        <button id="logoutButton" class="icon-button" title="Выйти" aria-label="Выйти">↪</button>
      </header>

      <div id="messages" class="messages" aria-live="polite">
        <div id="emptyState" class="empty-state">
          <span>👋</span>
          <p>Здесь появятся ваши сообщения</p>
        </div>
      </div>

      <div id="uploadBar" class="upload-bar hidden">
        <span id="uploadName"></span>
        <button id="cancelFile" type="button">×</button>
      </div>

      <form id="messageForm" class="composer">
        <input id="fileInput" type="file" hidden
               accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar">
        <button id="attachButton" class="attach-button" type="button" aria-label="Прикрепить файл">📎</button>
        <textarea id="messageInput" rows="1" maxlength="4000"
                  placeholder="Сообщение…" aria-label="Сообщение"></textarea>
        <button id="sendButton" class="send-button" type="submit" aria-label="Отправить">➤</button>
      </form>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
